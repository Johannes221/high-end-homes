services:
  - type: web
    name: high-end-homes-backend
    runtime: node
    plan: starter
    rootDir: my-app
    buildCommand: npm ci && npm run build:production
    startCommand: npm run start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: SERPAPI_KEY
        sync: false
